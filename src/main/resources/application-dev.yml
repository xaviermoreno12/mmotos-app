spring:
  jpa:
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  flyway:
    baseline-on-migrate: true

app:
  fiscal:
    modo: NO_FISCAL
  n8n:
    enabled: false

logging:
  level:
    com.mmotos: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.orm.jdbc.bind: TRACE
